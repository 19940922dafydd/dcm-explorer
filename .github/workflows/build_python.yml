name: Build Python EXE

on:
  push:
    branches: [ main, master ]
    paths:
      - 'dcm-exam/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r dcm-exam/requirements.txt
        pip install pyinstaller
        
    - name: Build EXE via PyInstaller
      run: |
        cd dcm-exam
        pyinstaller --name "DCM资源管家" --windowed --onefile --noconfirm --clean --add-data "web;web" main.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DCM资源管家-Windows-EXE
        path: dcm-exam/dist/DCM资源管家.exe
